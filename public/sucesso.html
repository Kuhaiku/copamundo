<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Aprovado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center font-sans">
    <div class="bg-gray-950 border border-gray-800 p-8 rounded-xl shadow-2xl max-w-md w-full text-center">
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-900/30 mb-6">
            <svg class="h-10 w-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        
        <h1 class="text-3xl font-bold text-white mb-2">Pagamento Aprovado!</h1>
        <p class="text-gray-400 mb-8">Sua compra foi concluída com sucesso. Os links para download dos seus PDFs foram enviados para o seu e-mail.</p>
        
        <div class="bg-gray-900 rounded p-4 mb-6 border border-gray-800 text-sm text-gray-400">
            <p>Não esqueça de verificar a caixa de <strong>Spam</strong> ou <strong>Lixo Eletrônico</strong> caso não encontre a mensagem na caixa de entrada.</p>
        </div>

        <a href="/" class="block w-full bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 px-4 rounded transition duration-200">
            Voltar para a Loja
        </a>
    </div>
</body>
</html>
